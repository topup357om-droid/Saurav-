<!DOCTYPE html>
<html>
<head>
  <title>Firebase Auth Tester</title>
</head>
<body>

  <h2>🔥 Firebase Auth Test Tool</h2>

  <!-- Google -->
  <button onclick="googleLogin()">Login with Google</button>

  <!-- Email/Password -->
  <h3>Email Login</h3>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <br><br>
  <button onclick="signup()">Signup</button>
  <button onclick="login()">Login</button>

  <!-- Anonymous -->
  <h3>Guest</h3>
  <button onclick="guestLogin()">Login Anonymously</button>

  <br><br>
  <button onclick="logout()">Logout</button>

  <h3>User Info</h3>
  <pre id="output">Not logged in</pre>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

    import {
      getAuth,
      signInWithPopup,
      GoogleAuthProvider,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      signInAnonymously,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAv9NgB8e3UqjrdJP6U2hy0B9agZwRtNTM",
      authDomain: "sauravtask-e2e49.firebaseapp.com",
      projectId: "sauravtask-e2e49",
      storageBucket: "sauravtask-e2e49.appspot.com",
      messagingSenderId: "997442277464",
      appId: "1:997442277464:web:96eab391449df141e03a2d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // GOOGLE LOGIN
    window.googleLogin = async () => {
      try {
        await signInWithPopup(auth, provider);
      } catch (e) {
        alert(e.message);
      }
    };

    // EMAIL SIGNUP
    window.signup = async () => {
      const email = document.getElementById("email").value;
      const pass = document.getElementById("password").value;

      try {
        await createUserWithEmailAndPassword(auth, email, pass);
      } catch (e) {
        alert(e.message);
      }
    };

    // EMAIL LOGIN
    window.login = async () => {
      const email = document.getElementById("email").value;
      const pass = document.getElementById("password").value;

      try {
        await signInWithEmailAndPassword(auth, email, pass);
      } catch (e) {
        alert(e.message);
      }
    };

    // ANONYMOUS LOGIN
    window.guestLogin = async () => {
      try {
        await signInAnonymously(auth);
      } catch (e) {
        alert(e.message);
      }
    };

    // LOGOUT
    window.logout = async () => {
      await signOut(auth);
    };

    // USER STATE
    onAuthStateChanged(auth, (user) => {
      const el = document.getElementById("output");

      if (user) {
        el.innerText = `
UID: ${user.uid}
Email: ${user.email || "N/A"}
Name: ${user.displayName || "N/A"}
Anonymous: ${user.isAnonymous}
        `;
      } else {
        el.innerText = "Not logged in";
      }
    });
  </script>

</body>
</html>
